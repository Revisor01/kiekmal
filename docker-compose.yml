services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: prayback
      POSTGRES_PASSWORD: prayback_dev
      POSTGRES_DB: prayback
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prayback"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
