services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://prayback:${POSTGRES_PASSWORD}@db:5432/prayback
      PORT: "3000"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kiekmal-api.rule=Host(`kiek-mal.de`)"
      - "traefik.http.services.kiekmal-api.loadbalancer.server.port=3000"
    networks:
      - traefik
      - default

  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: prayback
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prayback
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prayback"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:

networks:
  traefik:
    external: true
